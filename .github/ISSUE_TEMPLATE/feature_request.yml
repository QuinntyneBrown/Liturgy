name: Feature request
description: Suggest a scoped improvement to Liturgy
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or contributor problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you would like.
    validations:
      required: true
  - type: textarea
    id: enforcement
    attributes:
      label: Enforcement impact
      description: Does this affect 4D gates or 5R completion? If so, how should the server enforce it?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
