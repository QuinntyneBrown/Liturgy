<a class="skip-link" href="#main">Skip to content</a>
<div class="app">
  <nav class="rail" aria-label="Workspace">
    <div class="rail__brand">
      <span class="rail__mark"></span>
      <span>
        <span class="rail__wordmark">Liturgy</span>
        <span class="rail__tag">New Hope Collective</span>
      </span>
    </div>

    <div class="rail__label">Workspace</div>
    <ul class="stations" style="gap: 0">
      <li class="station">
        <a class="station__link" routerLink="/projects" routerLinkActive="is-current">
          <span class="station__node">P</span>
          <span class="station__meta">
            <span class="station__name">Projects</span>
            <span class="station__sub">4D journeys</span>
          </span>
        </a>
      </li>
    </ul>

    <div class="rail__foot">
      <button class="btn btn--on-dark btn--sm" type="button" (click)="signOut()">Sign out</button>
    </div>
  </nav>

  <main class="main" id="main">
    <header class="topbar">
      <span class="topbar__crumbs"><b>Liturgy</b> — build in rhythm</span>
      <span class="topbar__spacer"></span>
      @if (user(); as u) {
        <span class="topbar__pill">{{ u.firstName }} {{ u.lastName }}</span>
        <span class="avatar" [attr.title]="u.initials">{{ u.initials }}</span>
      }
    </header>
    <div class="content content--wide">
      <router-outlet />
    </div>
  </main>
</div>
